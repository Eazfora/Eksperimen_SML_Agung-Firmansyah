name: Automated Preprocessing - Student Performance

on:
  push:
    branches: [main]
    paths:
      - 'student_performance_raw.csv'
      - 'preprocessing/automate_Agung-Firmansyah.py'
  workflow_dispatch:   # manual trigger

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Automated Preprocessing
        run: |
          python preprocessing/automate_Agung-Firmansyah.py

      - name: Verify Output Files
        run: |
          echo "=== Output Files ==="
          ls -lh preprocessing/student_performance_preprocessing/
          echo "=== Train shape ==="
          python -c "import pandas as pd; df=pd.read_csv('preprocessing/student_performance_preprocessing/train.csv'); print(df.shape)"
          echo "=== Test shape ==="
          python -c "import pandas as pd; df=pd.read_csv('preprocessing/student_performance_preprocessing/test.csv'); print(df.shape)"

      - name: Commit and Push Preprocessed Dataset
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/student_performance_preprocessing/
          git diff --staged --quiet || git commit -m "chore: update preprocessed dataset [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
